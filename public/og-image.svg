<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Anton&amp;family=Space+Mono:wght@400;700&amp;display=swap');
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>
  
  <!-- Yellow accent block -->
  <rect x="0" y="0" width="500" height="630" fill="#ffff00"/>
  
  <!-- Border lines -->
  <line x1="500" y1="0" x2="500" y2="630" stroke="#000000" stroke-width="4"/>
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#000000" stroke-width="4"/>
  <line x1="0" y1="626" x2="1200" y2="626" stroke="#000000" stroke-width="4"/>
  <line x1="1196" y1="0" x2="1196" y2="630" stroke="#000000" stroke-width="4"/>
  
  <!-- Name on yellow background -->
  <text x="50" y="280" font-family="Anton, sans-serif" font-size="140" fill="#000000" font-weight="400">IMRAN</text>
  
  <!-- Role text -->
  <text x="550" y="200" font-family="Space Mono, monospace" font-size="24" fill="#888888" letter-spacing="0.15em">SENIOR</text>
  <text x="550" y="270" font-family="Anton, sans-serif" font-size="64" fill="#000000">FULL STACK</text>
  <text x="550" y="350" font-family="Anton, sans-serif" font-size="64" fill="#000000">DEVELOPER</text>
  
  <!-- Tech stack -->
  <g transform="translate(550, 420)">
    <rect x="0" y="0" width="100" height="40" fill="none" stroke="#000000" stroke-width="2"/>
    <text x="50" y="27" font-family="Space Mono, monospace" font-size="14" fill="#000000" text-anchor="middle">REACT</text>
    
    <rect x="110" y="0" width="130" height="40" fill="none" stroke="#000000" stroke-width="2"/>
    <text x="175" y="27" font-family="Space Mono, monospace" font-size="14" fill="#000000" text-anchor="middle">TYPESCRIPT</text>
    
    <rect x="250" y="0" width="60" height="40" fill="none" stroke="#000000" stroke-width="2"/>
    <text x="280" y="27" font-family="Space Mono, monospace" font-size="14" fill="#000000" text-anchor="middle">GO</text>
    
    <rect x="320" y="0" width="80" height="40" fill="none" stroke="#000000" stroke-width="2"/>
    <text x="360" y="27" font-family="Space Mono, monospace" font-size="14" fill="#000000" text-anchor="middle">RUST</text>
  </g>
  
  <!-- Website URL -->
  <text x="550" y="550" font-family="Space Mono, monospace" font-size="20" fill="#000000" font-weight="700">imran.codes</text>
  
  <!-- Location -->
  <text x="550" y="580" font-family="Space Mono, monospace" font-size="14" fill="#888888">Bengaluru, India</text>
  
  <!-- Decorative arrow -->
  <text x="1100" y="550" font-family="Anton, sans-serif" font-size="60" fill="#000000">↗</text>
</svg>